<!-- Naver Search Advisor 사이트 인증 (jekyll-seo-tag 가 naver 를 지원하지 않아 여기서 렌더링) -->
{% if site.webmaster_verifications.naver and site.webmaster_verifications.naver != '' %}
  <meta name="naver-site-verification" content="{{ site.webmaster_verifications.naver }}">
{% endif %}

<!-- Google AdSense -->
{% if site.adsense.client and site.adsense.client != '' %}
  <script
    async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ site.adsense.client }}"
    crossorigin="anonymous"
  ></script>
  <style>
    /* 광고가 채워지지 않으면(unfilled) 광고 영역과 래퍼를 통째로 숨겨 빈 공간을 남기지 않는다 */
    ins.adsbygoogle[data-ad-status='unfilled'] {
      display: none !important;
    }
    .adsense-unit:has(ins.adsbygoogle[data-ad-status='unfilled']) {
      display: none;
    }
    /* 우측 패널 광고: 인기 태그 아래에 일반 흐름으로 배치.
       (sticky 고정은 페이지 상단에서 인기 태그를 덮는 문제가 있어 제거함) */
    /* 본문 중간(인아티클) 광고: 채워진 경우에만 위아래 경계선과 '광고' 라벨을 붙여
       본문 콘텐츠와 명확히 구분한다 (독자가 바로 인지하고 건너뛸 수 있도록)
       — 현재 slot_post_mid 미사용 상태라 렌더링되지 않음. 재사용 대비 유지 */
    .adsense-in-article:has(ins.adsbygoogle[data-ad-status='filled']) {
      border-top: 1px solid rgba(128, 128, 128, 0.25);
      border-bottom: 1px solid rgba(128, 128, 128, 0.25);
      padding: 0.5rem 0 0.75rem;
    }
    .adsense-in-article:has(ins.adsbygoogle[data-ad-status='filled'])::before {
      content: '광고';
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: rgba(128, 128, 128, 0.7);
      margin-bottom: 0.35rem;
    }
  </style>
{% endif %}
