<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" font-family="Segoe UI, Malgun Gothic, Apple SD Gothic Neo, sans-serif">
<defs>
<marker id="ar-slate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker>
<marker id="ar-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/></marker>
<marker id="ar-orange" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/></marker>
<marker id="ar-sky" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#0284c7"/></marker>
<marker id="ar-red" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/></marker>
<marker id="ar-green" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/></marker>
<marker id="ar-violet" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/></marker>
<marker id="ar-axis" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
</defs>
<rect x="1" y="1" width="858" height="468" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="430.0" y="34" font-size="17" fill="#1e293b" text-anchor="middle" font-weight="700">복소 평면(I–Q 평면)의 페이저(phasor) 표현</text>
<line x1="60" y1="270" x2="460" y2="270" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="butt" marker-end="url(#ar-axis)"/>
<line x1="250" y1="435" x2="250" y2="90" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="butt" marker-end="url(#ar-axis)"/>
<text x="458" y="292" font-size="12.5" fill="#64748b" text-anchor="end">I (실수부)</text>
<text x="262" y="98" font-size="12.5" fill="#64748b" text-anchor="start">Q (허수부)</text>
<circle cx="250" cy="270" r="150" fill="none" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="5 6"/>
<path d="M348.66,129.11 A172,172 0 0 0 205.48,103.86" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ar-slate)"/>
<text x="122" y="98" font-size="12.5" fill="#64748b" text-anchor="middle">회전 속도 = 주파수</text>
<line x1="356.06601717798213" y1="163.93398282201787" x2="356.06601717798213" y2="270" stroke="#2563eb" stroke-width="1.6" stroke-linecap="butt" stroke-dasharray="4 4"/>
<line x1="356.06601717798213" y1="163.93398282201787" x2="250" y2="163.93398282201787" stroke="#ea580c" stroke-width="1.6" stroke-linecap="butt" stroke-dasharray="4 4"/>
<line x1="250" y1="270" x2="356.06601717798213" y2="270" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
<line x1="250" y1="270" x2="250" y2="163.93398282201787" stroke="#ea580c" stroke-width="5" stroke-linecap="round"/>
<text x="303.03300858899104" y="294" font-size="13.5" fill="#2563eb" text-anchor="middle" font-weight="700">I = A cos φ</text>
<text x="238" y="220.96699141100893" font-size="13.5" fill="#ea580c" text-anchor="end" font-weight="700">Q = A sin φ</text>
<line x1="250" y1="270" x2="353.06601717798213" y2="166.93398282201787" stroke="#7c3aed" stroke-width="3.6" stroke-linecap="round" marker-end="url(#ar-violet)"/>
<circle cx="356.06601717798213" cy="163.93398282201787" r="5" fill="#7c3aed"/>
<text x="368.06601717798213" y="153.93398282201787" font-size="13" fill="#7c3aed" text-anchor="start" font-weight="700">(I, Q)</text>
<text x="289.03300858899104" y="202.96699141100893" font-size="13" fill="#7c3aed" text-anchor="middle" font-weight="600" transform="rotate(-45 289.03300858899104 202.96699141100893)">A (진폭)</text>
<path d="M302.00,270.00 A52,52 0 0 0 286.77,233.23" fill="none" stroke="#16a34a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#ar-green)"/>
<text x="314" y="258" font-size="15" fill="#16a34a" text-anchor="start" font-weight="700">φ</text>
<rect x="540" y="92" width="292" height="320" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="686.0" y="124" font-size="14.5" fill="#1e293b" text-anchor="middle" font-weight="700">페이저 하나에 담긴 3가지 정보</text>
<circle cx="568" cy="161" r="5" fill="#7c3aed"/>
<text x="584" y="166" font-size="13.5" fill="#1e293b" text-anchor="start" font-weight="600">진폭 — 신호의 세기</text>
<text x="584" y="190" font-size="14.5" fill="#7c3aed" text-anchor="start" font-weight="600">A = √(I² + Q²)</text>
<circle cx="568" cy="227" r="5" fill="#16a34a"/>
<text x="584" y="232" font-size="13.5" fill="#1e293b" text-anchor="start" font-weight="600">위상 — 파동의 진행 상태</text>
<text x="584" y="256" font-size="14.5" fill="#16a34a" text-anchor="start" font-weight="600">φ = atan2(Q, I)</text>
<circle cx="568" cy="293" r="5" fill="#64748b"/>
<text x="584" y="298" font-size="13.5" fill="#1e293b" text-anchor="start" font-weight="600">주파수 — 위상의 변화율</text>
<text x="584" y="322" font-size="14.5" fill="#64748b" text-anchor="start" font-weight="600">f = (1/2π) · dφ/dt</text>
<line x1="560" y1="350" x2="812" y2="350" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="butt"/>
<text x="686.0" y="374" font-size="12" fill="#64748b" text-anchor="middle">신호가 진동하면 벡터는 원을 그리며 돌고,</text>
<text x="686.0" y="392" font-size="12" fill="#64748b" text-anchor="middle">그 회전 속도가 곧 신호의 주파수다.</text>
</svg>
