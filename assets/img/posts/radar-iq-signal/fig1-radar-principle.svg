<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" font-family="Segoe UI, Malgun Gothic, Apple SD Gothic Neo, sans-serif">
<defs>
<marker id="ar-slate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker>
<marker id="ar-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/></marker>
<marker id="ar-orange" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/></marker>
<marker id="ar-sky" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#0284c7"/></marker>
<marker id="ar-red" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/></marker>
<marker id="ar-green" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/></marker>
<marker id="ar-violet" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/></marker>
<marker id="ar-axis" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
</defs>
<rect x="1" y="1" width="858" height="438" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="430.0" y="36" font-size="18" fill="#1e293b" text-anchor="middle" font-weight="700">레이더의 기본 원리</text>
<text x="430.0" y="58" font-size="13.5" fill="#64748b" text-anchor="middle">왕복 시간 τ → 거리,  도플러 편이 f<tspan font-size="0.72em" baseline-shift="-18%">d</tspan> → 속도</text>
<rect x="42" y="120" width="135" height="145" rx="12" fill="#eef2ff" stroke="#818cf8" stroke-width="1.5"/>
<text x="109" y="292" font-size="13.5" fill="#1e293b" text-anchor="middle" font-weight="600">레이더 센서</text>
<line x1="120" y1="155" x2="158" y2="155" stroke="#64748b" stroke-width="2" stroke-linecap="butt"/>
<path d="M158,141 L184,155 L158,169 Z" fill="#ffffff" stroke="#0284c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="103" y="160" font-size="13" fill="#0284c7" text-anchor="middle" font-weight="700">Tx</text>
<line x1="120" y1="230" x2="158" y2="230" stroke="#64748b" stroke-width="2" stroke-linecap="butt"/>
<path d="M158,216 L184,230 L158,244 Z" fill="#ffffff" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="103" y="235" font-size="13" fill="#dc2626" text-anchor="middle" font-weight="700">Rx</text>
<path d="M210.81,173.74 A28,28 0 0 0 210.81,136.26" fill="none" stroke="#0284c7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M227.16,188.46 A50,50 0 0 0 227.16,121.54" fill="none" stroke="#0284c7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M243.51,203.18 A72,72 0 0 0 243.51,106.82" fill="none" stroke="#0284c7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
<line x1="285" y1="155" x2="590" y2="155" stroke="#0284c7" stroke-width="2.4" stroke-linecap="butt" marker-end="url(#ar-sky)"/>
<text x="437" y="140" font-size="13.5" fill="#0284c7" text-anchor="middle" font-weight="600">송신파  f<tspan font-size="0.72em" baseline-shift="-18%">0</tspan></text>
<path d="M607.19,211.26 A28,28 0 0 0 607.19,248.74" fill="none" stroke="#dc2626" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 5"/>
<path d="M590.84,196.54 A50,50 0 0 0 590.84,263.46" fill="none" stroke="#dc2626" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 5"/>
<path d="M574.49,181.82 A72,72 0 0 0 574.49,278.18" fill="none" stroke="#dc2626" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 5"/>
<line x1="545" y1="230" x2="285" y2="230" stroke="#dc2626" stroke-width="2.4" stroke-linecap="butt" stroke-dasharray="7 6" marker-end="url(#ar-red)"/>
<text x="430" y="258" font-size="13.5" fill="#dc2626" text-anchor="middle" font-weight="600">반사파(에코)  f<tspan font-size="0.72em" baseline-shift="-18%">0</tspan> ± f<tspan font-size="0.72em" baseline-shift="-18%">d</tspan>,  τ 만큼 지연</text>
<path d="M666,204 L682,178 L744,178 L760,204 Z" fill="#cbd5e1" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="648" y="202" width="140" height="36" rx="10" fill="#475569" stroke="#334155" stroke-width="1.5"/>
<circle cx="680" cy="240" r="13" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
<circle cx="756" cy="240" r="13" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
<circle cx="680" cy="240" r="5.5" fill="#94a3b8"/>
<circle cx="756" cy="240" r="5.5" fill="#94a3b8"/>
<text x="718" y="268" font-size="12.5" fill="#64748b" text-anchor="middle">표적 (target)</text>
<line x1="706" y1="160" x2="644" y2="160" stroke="#16a34a" stroke-width="3" stroke-linecap="butt" marker-end="url(#ar-green)"/>
<text x="718" y="165" font-size="13" fill="#16a34a" text-anchor="start" font-weight="600">상대 속도 v</text>
<line x1="190" y1="300" x2="648" y2="300" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="butt" stroke-dasharray="4 4" marker-end="url(#ar-axis)" marker-start="url(#ar-axis)"/>
<text x="419" y="293" font-size="12.5" fill="#64748b" text-anchor="middle">거리 R</text>
<rect x="60" y="330" width="350" height="82" rx="10" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5"/>
<text x="235" y="356" font-size="14" fill="#0284c7" text-anchor="middle" font-weight="700">거리 (Range)</text>
<text x="235" y="382" font-size="15.5" fill="#1e293b" text-anchor="middle" font-weight="600">R = c · τ / 2</text>
<text x="235" y="402" font-size="11.5" fill="#64748b" text-anchor="middle">τ: 왕복 시간,  c: 전파 속도(빛의 속도)</text>
<rect x="450" y="330" width="350" height="82" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
<text x="625" y="356" font-size="14" fill="#dc2626" text-anchor="middle" font-weight="700">속도 (Velocity)</text>
<text x="625" y="382" font-size="15.5" fill="#1e293b" text-anchor="middle" font-weight="600">f<tspan font-size="0.72em" baseline-shift="-18%">d</tspan> = 2v / λ</text>
<text x="625" y="402" font-size="11.5" fill="#64748b" text-anchor="middle">f<tspan font-size="0.72em" baseline-shift="-18%">d</tspan>: 도플러 편이,  λ: 파장 (= c/f<tspan font-size="0.72em" baseline-shift="-18%">0</tspan>)</text>
</svg>
