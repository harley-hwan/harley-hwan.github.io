<text x="714" y="148" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="700">디지털 신호 처리 (DSP)</text>
<line x1="628" y1="162" x2="800" y2="162" stroke="#ddd6fe" stroke-width="1.5" stroke-linecap="butt"/>
<text x="714" y="232" font-size="16" fill="#7c3aed" text-anchor="middle" font-weight="700">x[n] = I[n] + j·Q[n]</text>
<text x="714" y="256" font-size="12" fill="#64748b" text-anchor="middle">복소 기저대역 신호</text>
<text x="714" y="322" font-size="12.5" fill="#1e293b" text-anchor="middle">FFT · 위상 추적 · 필터링</text>
<text x="714" y="344" font-size="12.5" fill="#1e293b" text-anchor="middle" font-weight="600">→ 거리 · 속도 · 각도 · 미세변위</text>
<text x="430.0" y="420" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="600">같은 수신 신호를 90° 차이 나는 두 기준파와 곱한 뒤 저역 필터를 거치면, 반송파 f<tspan font-size="0.72em" baseline-shift="-18%">0</tspan>는 사라지고 위상 φ(t)를 담은 I/Q 쌍만 남는다.</text>
